<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Locked In</title>
    <style>
      * { box-sizing: border-box; }

      body {
        width: 280px;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: white;
        background: radial-gradient(circle at 20% 0%, #2a2a52 0%, #1a1a2e 55%, #12101f 100%);
        margin: 0;
      }

      h1 {
        font-size: 19px;
        margin: 0 0 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-icon { width: 22px; height: 22px; border-radius: 6px; display: block; }
      .gradient-text {
        background: linear-gradient(90deg, #e74c3c, #f39c12);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .icon { vertical-align: middle; flex-shrink: 0; }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        font-size: 13px;
      }
      .switch {
        position: relative;
        width: 44px;
        height: 24px;
        flex-shrink: 0;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 24px;
        transition: 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider { background: linear-gradient(90deg, #e74c3c, #f39c12); }
      input:checked + .slider::before { transform: translateX(20px); }

      .session-box {
        background: rgba(37, 37, 63, 0.55);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 16px;
        text-align: center;
      }
      #countdown {
        font-size: 28px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        margin-bottom: 4px;
        background: linear-gradient(90deg, #e74c3c, #f39c12);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #sessionBlockCount {
        font-size: 12px;
        color: #8a8aa0;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .presets {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .presets button {
        flex: 1;
        padding: 8px 0;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: white;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .presets button.selected {
        background: linear-gradient(90deg, #e74c3c, #f39c12);
        border-color: transparent;
      }
      #startSession, #stopSession {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        color: white;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      #startSession { background: linear-gradient(90deg, #e74c3c, #f39c12); }
      #startSession:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(231, 76, 60, 0.35); }
      #stopSession { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); }
      #stopSession:hover { background: rgba(255, 255, 255, 0.14); }

      .mode-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .mode-tab {
        flex: 1;
        padding: 6px 0;
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #aaa;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .mode-tab.selected {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border-color: rgba(255, 255, 255, 0.2);
      }
      .custom-duration {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
      }
      .custom-duration input[type="number"] {
        width: 50px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 13px;
        text-align: center;
      }
      .custom-duration span {
        font-size: 12px;
        color: #aaa;
      }
      .settings-section {
        margin-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 12px;
      }
      .settings-toggle {
        background: none;
        border: none;
        color: #aaa;
        font-size: 12px;
        cursor: pointer;
        padding: 0;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .settings-body { display: none; }
      #apiKeyInput {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 12px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      #apiKeyInput::placeholder { color: #8a8aa0; }
      #saveApiKey {
        width: 100%;
        padding: 8px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      #saveApiKey:hover { background: rgba(255, 255, 255, 0.14); }
      input[type="time"] {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 13px;
        margin-bottom: 8px;
        box-sizing: border-box;
        color-scheme: dark;
      }
      #studyTopic {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 13px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      #studyTopic::placeholder { color: #8a8aa0; }
      #studyTopicDisplay {
        font-size: 13px;
        color: #ccc;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
    </style>
  </head>
  <body>
    <h1><img src="icons/icon32.png" alt="" class="logo-icon" /><span class="gradient-text">Locked In</span></h1>

    <div id="sessionActiveBox" class="session-box" style="display: none">
      <div id="studyTopicDisplay">
        <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6c-2-1.5-5-1.5-8-1v13c3-.5 6-.5 8 1c2-1.5 5-1.5 8-1V5c-3-.5-6-.5-8 1Z"/><path d="M12 6v13"/></svg>
        <span id="studyTopicText"></span>
      </div>
      <div id="countdown">25:00</div>
      <div id="sessionBlockCount">
        <svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M6.5 6.5l11 11"/></svg>
        <span id="sessionBlockCountText"></span>
      </div>
      <button id="stopSession">End Session Early</button>
    </div>

    <div id="sessionSetupBox">
      <div class="mode-tabs">
        <button class="mode-tab selected" data-mode="duration">For</button>
        <button class="mode-tab" data-mode="until">Until</button>
      </div>

      <div id="durationMode">
        <div class="presets">
          <button data-minutes="25">25m</button>
          <button data-minutes="50">50m</button>
          <button data-minutes="90">90m</button>
        </div>
        <div class="custom-duration">
          <input type="number" id="customHours" min="0" max="23" value="0" />
          <span>h</span>
          <input type="number" id="customMinutes" min="0" max="59" value="25" />
          <span>m</span>
        </div>
      </div>

      <div id="untilMode" style="display: none">
        <input type="time" id="untilTime" />
      </div>

      <input type="text" id="studyTopic" placeholder="What are you studying?" />

      <button id="startSession">Start Focus Session</button>
    </div>

    <div class="toggle-row">
      <span>Focus Mode</span>
      <label class="switch">
        <input type="checkbox" id="focusToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="settings-section">
      <button class="settings-toggle" data-target="aiSettingsBody"><svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82A1.65 1.65 0 0 0 3 13.09H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg> Anthropic API Key ▾</button>
      <div id="aiSettingsBody" class="settings-body">
        <input type="password" id="apiKeyInput" placeholder="Anthropic API key (sk-ant-...)" />
        <button id="saveApiKey">Save Key</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
