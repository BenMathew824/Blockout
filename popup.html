<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Locked In</title>
    <style>
      * { box-sizing: border-box; }

      body {
        width: 280px;
        padding: 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: white;
        background: radial-gradient(circle at 20% 0%, #2a2a52 0%, #1a1a2e 55%, #12101f 100%);
        margin: 0;
      }

      h1 {
        font-size: 19px;
        margin: 0 0 16px;
        background: linear-gradient(90deg, #e74c3c, #f39c12);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        display: inline-block;
      }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        font-size: 13px;
      }
      .switch {
        position: relative;
        width: 44px;
        height: 24px;
        flex-shrink: 0;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 24px;
        transition: 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider { background: linear-gradient(90deg, #e74c3c, #f39c12); }
      input:checked + .slider::before { transform: translateX(20px); }

      .session-box {
        background: rgba(37, 37, 63, 0.55);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 16px;
        margin-bottom: 16px;
        text-align: center;
      }
      #countdown {
        font-size: 28px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        margin-bottom: 4px;
        background: linear-gradient(90deg, #e74c3c, #f39c12);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #sessionBlockCount {
        font-size: 12px;
        color: #8a8aa0;
        margin-bottom: 10px;
      }
      .presets {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .presets button {
        flex: 1;
        padding: 8px 0;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: white;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .presets button.selected {
        background: linear-gradient(90deg, #e74c3c, #f39c12);
        border-color: transparent;
      }
      #startSession, #stopSession {
        width: 100%;
        padding: 11px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        color: white;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      #startSession { background: linear-gradient(90deg, #e74c3c, #f39c12); }
      #startSession:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(231, 76, 60, 0.35); }
      #stopSession { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.1); }
      #stopSession:hover { background: rgba(255, 255, 255, 0.14); }

      .mode-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .mode-tab {
        flex: 1;
        padding: 6px 0;
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: #aaa;
        border-radius: 8px;
        font-size: 12px;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .mode-tab.selected {
        background: rgba(255, 255, 255, 0.1);
        color: white;
        border-color: rgba(255, 255, 255, 0.2);
      }
      .custom-duration {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
      }
      .custom-duration input[type="number"] {
        width: 50px;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 13px;
        text-align: center;
      }
      .custom-duration span {
        font-size: 12px;
        color: #aaa;
      }
      .settings-section {
        margin-top: 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        padding-top: 12px;
      }
      .settings-toggle {
        background: none;
        border: none;
        color: #aaa;
        font-size: 12px;
        cursor: pointer;
        padding: 0;
        margin-bottom: 8px;
      }
      .settings-body { display: none; }

      ul.chip-list {
        list-style: none;
        padding: 0;
        margin: 0 0 10px;
        max-height: 120px;
        overflow-y: auto;
      }
      ul.chip-list li {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 6px 10px;
        border-radius: 8px;
        margin-bottom: 4px;
        font-size: 13px;
      }
      ul.chip-list li button {
        background: none;
        border: none;
        color: #ff8a75;
        cursor: pointer;
        font-size: 13px;
        padding: 0;
      }
      ul.chip-list .empty {
        color: #8a8aa0;
        font-size: 12px;
        padding: 4px 2px;
      }
      .add-row { display: flex; gap: 6px; margin-bottom: 4px; }
      .add-row input[type="text"] {
        flex: 1;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 13px;
      }
      .add-row input[type="text"]::placeholder { color: #8a8aa0; }
      .add-row button {
        padding: 8px 12px;
        background: linear-gradient(90deg, #e74c3c, #f39c12);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }

      .stat-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 8px;
      }
      .stat-row strong { color: white; }
      #statsTopSites { font-size: 12px; color: #b8b8c8; margin-bottom: 10px; }
      #statsTopSites .site-row { display: flex; justify-content: space-between; margin-bottom: 4px; }
      #statsTopSites .empty { color: #8a8aa0; }
      #resetStats {
        width: 100%;
        padding: 8px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      #resetStats:hover { background: rgba(255, 255, 255, 0.14); }
      #apiKeyInput {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 12px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      #apiKeyInput::placeholder { color: #8a8aa0; }
      #saveApiKey {
        width: 100%;
        padding: 8px;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
      }
      #saveApiKey:hover { background: rgba(255, 255, 255, 0.14); }
      input[type="time"] {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 13px;
        margin-bottom: 8px;
        box-sizing: border-box;
        color-scheme: dark;
      }
      #studyTopic {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.06);
        color: white;
        font-size: 13px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      #studyTopic::placeholder { color: #8a8aa0; }
      #studyTopicDisplay {
        font-size: 13px;
        color: #ccc;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <h1>🔒 Locked In</h1>

    <div id="sessionActiveBox" class="session-box" style="display: none">
      <div id="studyTopicDisplay"></div>
      <div id="countdown">25:00</div>
      <div id="sessionBlockCount"></div>
      <button id="stopSession">End Session Early</button>
    </div>

    <div id="sessionSetupBox">
      <div class="mode-tabs">
        <button class="mode-tab selected" data-mode="duration">For</button>
        <button class="mode-tab" data-mode="until">Until</button>
      </div>

      <div id="durationMode">
        <div class="presets">
          <button data-minutes="25">25m</button>
          <button data-minutes="50">50m</button>
          <button data-minutes="90">90m</button>
        </div>
        <div class="custom-duration">
          <input type="number" id="customHours" min="0" max="23" value="0" />
          <span>h</span>
          <input type="number" id="customMinutes" min="0" max="59" value="25" />
          <span>m</span>
        </div>
      </div>

      <div id="untilMode" style="display: none">
        <input type="time" id="untilTime" />
      </div>

      <input type="text" id="studyTopic" placeholder="What are you studying?" />

      <button id="startSession">Start Focus Session</button>
    </div>

    <div class="toggle-row">
      <span>Focus Mode</span>
      <label class="switch">
        <input type="checkbox" id="focusToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="settings-section">
      <button class="settings-toggle" data-target="aiSettingsBody">⚙ Anthropic API Key ▾</button>
      <div id="aiSettingsBody" class="settings-body">
        <input type="password" id="apiKeyInput" placeholder="Anthropic API key (sk-ant-...)" />
        <button id="saveApiKey">Save Key</button>
      </div>
    </div>

    <div class="settings-section">
      <button class="settings-toggle" data-target="allowlistBody">✅ Always Allow ▾</button>
      <div id="allowlistBody" class="settings-body">
        <ul id="allowlistList" class="chip-list"></ul>
        <div class="add-row">
          <input type="text" id="newAllowSite" placeholder="docs.google.com" />
          <button id="addAllowSite">Add</button>
        </div>
      </div>
    </div>

    <div class="settings-section">
      <button class="settings-toggle" data-target="statsBody">📊 Stats ▾</button>
      <div id="statsBody" class="settings-body">
        <div class="stat-row">
          <span>Total blocked</span>
          <strong id="statsTotal">0</strong>
        </div>
        <div id="statsTopSites"></div>
        <button id="resetStats">Reset Stats</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
