<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Blockout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }

      :root {
        --paper: #f7f2e8;
        --paper-2: #efe7d6;
        --ink: #201c16;
        --ink-soft: #6b6255;
        --line: rgba(32, 28, 22, 0.16);
        --accent-red: #e2472c;
        --accent-orange: #ef9412;
      }

      body {
        width: 280px;
        padding: 20px;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--ink);
        background: var(--paper);
        margin: 0;
      }

      h1, h2, h3 {
        font-family: "Fraunces", Georgia, serif;
        font-weight: 600;
      }

      h1 {
        font-size: 19px;
        margin: 0 0 16px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-icon { width: 22px; height: 22px; border-radius: 6px; display: block; }
      .gradient-text {
        background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .icon { vertical-align: middle; flex-shrink: 0; }

      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
        margin-bottom: 16px;
        font-size: 13px;
        font-weight: 500;
      }
      .switch {
        position: relative;
        width: 44px;
        height: 24px;
        flex-shrink: 0;
      }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: var(--paper-2);
        border: 2px solid var(--ink);
        border-radius: 24px;
        transition: 0.2s;
      }
      .slider::before {
        content: "";
        position: absolute;
        height: 14px;
        width: 14px;
        left: 3px;
        bottom: 3px;
        background-color: var(--ink);
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider { background: linear-gradient(90deg, var(--accent-red), var(--accent-orange)); }
      input:checked + .slider::before { transform: translateX(20px); background-color: #fff8ee; }

      .session-box {
        background: var(--paper-2);
        border: 2px solid var(--ink);
        border-radius: 14px;
        box-shadow: 3px 3px 0 var(--line);
        padding: 16px;
        margin-bottom: 16px;
        text-align: center;
      }
      #countdown {
        font-family: "Fraunces", serif;
        font-size: 28px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        margin-bottom: 4px;
        background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      #sessionBlockCount {
        font-size: 12px;
        color: var(--ink-soft);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
      }
      .presets {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .presets button {
        flex: 1;
        padding: 8px 0;
        background: var(--paper);
        border: 2px solid var(--line);
        color: var(--ink);
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s ease, border-color 0.15s ease;
      }
      .presets button.selected {
        background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
        color: #fff8ee;
        border-color: var(--ink);
        font-weight: 600;
      }
      #startSession, #stopSession {
        width: 100%;
        padding: 11px;
        border: 2px solid var(--ink);
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      #startSession {
        background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
        color: #fff8ee;
        box-shadow: 3px 3px 0 var(--ink);
      }
      #startSession:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink); }
      #stopSession { background: var(--paper); color: var(--ink); }
      #stopSession:hover { background: var(--paper-2); }

      .mode-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 8px;
      }
      .mode-tab {
        flex: 1;
        padding: 6px 0;
        background: var(--paper);
        border: 2px solid var(--line);
        color: var(--ink-soft);
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .mode-tab.selected {
        background: var(--paper-2);
        color: var(--ink);
        border-color: var(--ink);
      }
      .custom-duration {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 8px;
      }
      .custom-duration input[type="number"] {
        width: 50px;
        padding: 8px;
        border-radius: 8px;
        border: 2px solid var(--line);
        background: var(--paper);
        color: var(--ink);
        font-size: 13px;
        font-family: inherit;
        text-align: center;
      }
      .custom-duration span {
        font-size: 12px;
        color: var(--ink-soft);
      }
      .settings-section {
        margin-top: 16px;
        border-top: 2px solid var(--ink);
        padding-top: 12px;
      }
      .settings-toggle {
        background: none;
        border: none;
        color: var(--ink-soft);
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        padding: 0;
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .settings-body { display: none; }
      #apiKeyInput {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 2px solid var(--line);
        background: var(--paper);
        color: var(--ink);
        font-size: 12px;
        font-family: inherit;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      #apiKeyInput::placeholder { color: var(--ink-soft); }
      #saveApiKey {
        width: 100%;
        padding: 8px;
        background: var(--paper);
        border: 2px solid var(--ink);
        color: var(--ink);
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
      }
      #saveApiKey:hover { background: var(--paper-2); }
      input[type="time"] {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 2px solid var(--line);
        background: var(--paper);
        color: var(--ink);
        font-size: 13px;
        font-family: inherit;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      #studyTopic {
        width: 100%;
        padding: 8px;
        border-radius: 8px;
        border: 2px solid var(--line);
        background: var(--paper);
        color: var(--ink);
        font-size: 13px;
        font-family: inherit;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      #studyTopic::placeholder { color: var(--ink-soft); }
      #studyTopicDisplay {
        font-size: 13px;
        color: var(--ink-soft);
        margin-bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
    </style>
  </head>
  <body>
    <h1><img src="icons/icon32.png" alt="" class="logo-icon" /><span class="gradient-text">Blockout</span></h1>

    <div id="sessionActiveBox" class="session-box" style="display: none">
      <div id="studyTopicDisplay">
        <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 6c-2-1.5-5-1.5-8-1v13c3-.5 6-.5 8 1c2-1.5 5-1.5 8-1V5c-3-.5-6-.5-8 1Z"/><path d="M12 6v13"/></svg>
        <span id="studyTopicText"></span>
      </div>
      <div id="countdown">25:00</div>
      <div id="sessionBlockCount">
        <svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M6.5 6.5l11 11"/></svg>
        <span id="sessionBlockCountText"></span>
      </div>
      <button id="stopSession">End Session Early</button>
    </div>

    <div id="sessionSetupBox">
      <div class="mode-tabs">
        <button class="mode-tab selected" data-mode="duration">For</button>
        <button class="mode-tab" data-mode="until">Until</button>
      </div>

      <div id="durationMode">
        <div class="presets">
          <button data-minutes="25">25m</button>
          <button data-minutes="50">50m</button>
          <button data-minutes="90">90m</button>
        </div>
        <div class="custom-duration">
          <input type="number" id="customHours" min="0" max="23" value="0" />
          <span>h</span>
          <input type="number" id="customMinutes" min="0" max="59" value="25" />
          <span>m</span>
        </div>
      </div>

      <div id="untilMode" style="display: none">
        <input type="time" id="untilTime" />
      </div>

      <input type="text" id="studyTopic" placeholder="What are you studying?" />

      <button id="startSession">Start Focus Session</button>
    </div>

    <div class="toggle-row">
      <span>Focus Mode</span>
      <label class="switch">
        <input type="checkbox" id="focusToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="settings-section">
      <button class="settings-toggle" data-target="aiSettingsBody"><svg class="icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82A1.65 1.65 0 0 0 3 13.09H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg> Anthropic API Key ▾</button>
      <div id="aiSettingsBody" class="settings-body">
        <input type="password" id="apiKeyInput" placeholder="Anthropic API key (sk-ant-...)" />
        <button id="saveApiKey">Save Key</button>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
