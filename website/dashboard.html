<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Dashboard — Blockout</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="dashboard-header">
        <a href="index.html" class="logo"><img src="icon.png" alt="" class="logo-icon" /><span class="gradient-text">Blockout</span></a>
        <div>
          <span class="user-email" id="userEmail"></span>
          <button id="signOut" class="btn-secondary" style="padding: 8px 16px; font-size: 13px;">Sign Out</button>
        </div>
      </div>

      <div class="dashboard-grid">
        <div class="card">
          <div id="streakRow" class="streak-row" style="display: none;">
            <span class="streak-fire">🔥</span>
            <span id="streakText"></span>
          </div>
          <h2>Total Blocked</h2>
          <div class="stat-total gradient-text" id="totalBlocks">0</div>
          <div id="topSites"></div>
          <button id="resetStats" class="btn-secondary" style="width: 100%; margin-top: 12px; padding: 10px;">Reset Stats</button>
        </div>

        <div class="card">
          <h2 class="friendly-heading">What do you use to study?</h2>
          <p class="card-subtitle">Add sites you need during a session — these always stay unblocked.</p>

          <div class="preset-chips" id="presetChips"></div>

          <ul id="allowlistList" class="chip-list"></ul>
          <div class="add-row">
            <input type="text" id="newSite" placeholder="Or add a custom domain (e.g. docs.google.com)" />
            <button id="addSite">Add</button>
          </div>
          <div id="addSiteError" class="field-error"></div>
        </div>
      </div>
    </div>

    <script type="module" src="dashboard.js"></script>
  </body>
</html>
