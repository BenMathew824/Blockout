<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Blocked — Blockout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }

      :root {
        --paper: #f7f2e8;
        --paper-2: #efe7d6;
        --ink: #201c16;
        --ink-soft: #6b6255;
        --line: rgba(32, 28, 22, 0.16);
        --accent-red: #e2472c;
        --accent-orange: #ef9412;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        background: var(--paper);
        overflow: hidden;
        position: relative;
      }

      h1, h2, h3 {
        font-family: "Fraunces", Georgia, serif;
        font-weight: 600;
      }

      .card {
        position: relative;
        z-index: 1;
        width: 380px;
        max-width: 90vw;
        padding: 40px 32px;
        border-radius: 20px;
        background: var(--paper-2);
        border: 2px solid var(--ink);
        box-shadow: 8px 8px 0 var(--line);
        text-align: center;
      }

      .lock-ring {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 20px;
      }
      .lock-ring > svg { transform: rotate(-90deg); }
      .ring-bg {
        fill: none;
        stroke: var(--line);
        stroke-width: 6;
      }
      .ring-progress {
        fill: none;
        stroke: url(#ringGradient);
        stroke-width: 6;
        stroke-linecap: round;
        transition: stroke-dashoffset 1s linear;
      }
      .lock-icon {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--accent-red);
        animation: pulse 2.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.08); }
      }

      h1 {
        font-size: 24px;
        margin: 0 0 6px;
        background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .site-pill {
        display: inline-block;
        background: var(--paper);
        border: 2px solid var(--accent-red);
        color: var(--accent-red);
        font-size: 13px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 999px;
        margin-bottom: 14px;
        word-break: break-all;
      }

      p.subtitle {
        color: var(--ink-soft);
        font-size: 14px;
        line-height: 1.5;
        margin: 0 0 14px;
      }

      #reasonBox {
        display: none;
        background: var(--paper);
        border: 2px solid rgba(239, 148, 18, 0.45);
        color: var(--ink-soft);
        font-size: 13px;
        line-height: 1.5;
        padding: 10px 14px;
        border-radius: 12px;
        margin: 0 0 20px;
        text-align: left;
      }
      #reasonBox .icon { flex-shrink: 0; margin-top: 1px; color: var(--accent-orange); }
      #reasonBox .reason-row { display: flex; gap: 7px; align-items: flex-start; }

      #topic {
        display: none;
        background: var(--paper);
        border: 2px solid var(--line);
        padding: 10px 16px;
        border-radius: 12px;
        margin-bottom: 16px;
        font-size: 13px;
        color: var(--ink-soft);
      }
      #topic strong { color: var(--ink); }

      #countdownBox {
        display: none;
        margin-bottom: 24px;
      }
      .countdown-label {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-soft);
        margin-bottom: 4px;
        font-weight: 600;
      }
      #countdown {
        font-family: "Fraunces", serif;
        font-size: 22px;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }

      button {
        width: 100%;
        padding: 13px 20px;
        background: linear-gradient(90deg, var(--accent-red), var(--accent-orange));
        color: #fff8ee;
        border: 2px solid var(--ink);
        border-radius: 12px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 4px 4px 0 var(--ink);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      button:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0 var(--ink);
      }
      button:active { transform: translate(0, 0); box-shadow: 2px 2px 0 var(--ink); }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="lock-ring">
        <svg width="120" height="120">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#e2472c" />
              <stop offset="100%" stop-color="#ef9412" />
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="60" cy="60" r="52" />
          <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="52" />
        </svg>
        <div class="lock-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M7.5 11V7.5a4.5 4.5 0 0 1 9 0V11"/></svg>
        </div>
      </div>

      <h1>Blocked Out</h1>
      <div class="site-pill" id="site"></div>
      <p class="subtitle">This page was flagged as off-topic while Focus Mode is on.</p>

      <div id="reasonBox">
        <div class="reason-row">
          <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="6" width="12" height="12" rx="2"/><rect x="9" y="9" width="6" height="6" rx="1"/><path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2"/></svg>
          <span id="reasonText"></span>
        </div>
      </div>

      <div id="topic"><svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: -2px; margin-right: 4px;"><path d="M12 6c-2-1.5-5-1.5-8-1v13c3-.5 6-.5 8 1c2-1.5 5-1.5 8-1V5c-3-.5-6-.5-8 1Z"/><path d="M12 6v13"/></svg>You said you're focusing on: <strong id="topicText"></strong></div>

      <div id="countdownBox">
        <div class="countdown-label">Session ends in</div>
        <div id="countdown">--:--</div>
      </div>

      <button id="back">← Return</button>
    </div>

    <script src="blocked.js"></script>
  </body>
</html>
